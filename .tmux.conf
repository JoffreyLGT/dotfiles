
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind r
bind r source-file ~/.tmux.conf

# Set trepeat time to a second so I can just press prefix + jkjk to move around panes
set -g repeat-time 1000

# Newly created windows and panes use current path
bind c new-window      -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane resizing
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 14
bind -r Right resize-pane -R 5
bind -r Left resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

# Start windows and panes at 1, and keep numbering gapless when one is closed
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Border line above the status bar. The status bar is made of 2 rows, row 0 being
# the upper one, so the real status line is moved down to row 1 and row 0 holds
# the border. The unset restores the default templates first, so reloading the
# config always rebuilds this from a known state instead of from the previous run.
# The border string is longer than any terminal, tmux truncates it to the width.
set -g status 2
set -gu status-format
set -gF status-format[1] '#{status-format[0]}'
set -g status-format[0] '#[fg=#45475a,bg=#1e1e2e]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────'

# Session name on the left, turns red while the prefix is held
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[bg=#f38ba8],#[bg=#89b4fa]}#[fg=#1e1e2e,bold] #S #[default] "

# Windows as index:name, with flags (Z = zoomed, ! = bell, # = activity)
set -g window-status-separator ""
set -g window-status-format " #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W#{?window_zoomed_flag, Z,} #[default]"
setw -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e"

# Current dir, git branch, host and date/time on the right
set -g status-right-length 100
set -g status-right "#[fg=#a6adc8] #{b:pane_current_path} #[fg=#585b70]│#[fg=#a6adc8] #(cd '#{pane_current_path}' && git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#585b70]│#[fg=#a6adc8] #h #[fg=#585b70]│#[fg=#cdd6f4,bold] %a %d %b %H:%M "

# Highlight the border of the active pane
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Flag background windows that produce output, without a popup
set -g monitor-activity on
set -g visual-activity off


# Push copy-mode selections to the system clipboard (via OSC 52 to WezTerm ->
# Windows clipboard). The default is "external", which only relays clipboard
# escapes from apps inside tmux and never copies tmux's own selections out, so
# text yanked in copy-mode couldn't be pasted into Neovim.
set -g set-clipboard on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
# set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
# set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-sensible'

# set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

set-option -g focus-events on

# Monokai-pro
# set -g @plugin 'maxpetretta/tmux-monokai-pro'


# theme pack providing multiple themes
#set -g @plugin 'jimeh/tmux-themepack'
#set -g @themepack 'powerline/default/cyan'


# Undercurl support
set -g default-terminal "${TERM}"
# set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
# set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
set -ag terminal-overrides ",$TERM:RGB"


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
